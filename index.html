// ── Helpers ──
const fmtCurrency = (v) => v == null ? "-" : v.toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDatetime = (iso) => { if(!iso) return "-"; const d=new Date(iso); const day=d.getDate(); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; return `${day} ${ms[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const fmtDateFull = (d) => { const day=String(d.getDate()).padStart(2,"0"); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; return `${day} ${ms[d.getMonth()]} ${d.getFullYear()}`; };
const getChargePeriod = (period) => { const [m,y]=period.split(" "); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; const mi=ms.indexOf(m); return `${fmtDateFull(new Date(+y,mi,1))} - ${fmtDateFull(new Date(+y,mi+1,0))}`; };
const getInvoiceDate = (period) => { const [m,y]=period.split(" "); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; const mi=ms.indexOf(m); return fmtDateFull(new Date(+y,mi+1,1)); };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const isSubmittedOver3Days = (inv) => { if(inv.status!=="Submitted"||!inv.submittedDate) return false; const now=new Date("2026-03-09T12:00:00"); const sub=new Date(inv.submittedDate); return (now-sub)/(1000*60*60*24)>3; };

// ── StatusBadge ──
function StatusBadge({status,small}) {
  const c=STATUS_CONFIG[status]; if(!c) return <span>{status}</span>;
  if(c.style==="text") return <span style={{color:c.text,fontSize:small?11:13,fontWeight:500}}>{status}</span>;
  return <span style={{display:"inline-block",padding:small?"2px 8px":"4px 12px",borderRadius:999,fontSize:small?11:12,fontWeight:600,background:c.bg,color:c.text,border:c.border||"none",whiteSpace:"nowrap",lineHeight:"18px"}}>{status}</span>;
}

// ── Notifications ──
function Notifications({items,onDismiss}) {
  return <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,maxWidth:440}}>
    {items.map(n=><div key={n.id} onClick={()=>onDismiss(n.id)} style={{padding:"14px 18px",borderRadius:8,cursor:"pointer",boxShadow:"0 4px 24px rgba(0,0,0,0.18)",background:n.type==="success"?"#065f46":"#991b1b",color:"#fff",fontSize:13,lineHeight:1.5,animation:"slideIn 0.3s ease",display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:16,flexShrink:0}}>{n.type==="success"?"✓":"⚠"}</span><span>{n.message}</span>
    </div>)}

}

// ── Modal ──
function Modal({open,onClose,title,width,children}) {
  if(!open) return null;
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,width:"100%",maxWidth:width||560,maxHeight:"90vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 24px",borderBottom:"1px solid #e5e7eb",position:"sticky",top:0,background:"#fff",zIndex:2}}>
        <h3 style={{margin:0,fontSize:17,fontWeight:700,color:"#111827"}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#9ca3af",padding:2,lineHeight:1}}>✕</button>
      </div>
      <div style={{padding:"20px 24px"}}>{children}</div>
    </div>
  </div>;
}

// ── Kebab Menu ──
function KebabMenu({invoice,onAction}) {
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  const actions=[];
  const s=invoice.status;
  actions.push({label:"View Details",icon:"👁",action:"detail"});
  if(s==="Failed to Calculate") actions.push({label:"Retry Calculate",icon:"🔄",action:"retryCalc"});
  if(s==="Failed to Submit") actions.push({label:"Resend",icon:"↩",action:"resend"});
  if(s==="Submitted") actions.push({label:"Cancel",icon:"✕",action:"cancelInvoice"});
  return <div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(!open)} style={{background:open?"#f3f4f6":"#fff",border:"1px solid #e5e7eb",cursor:"pointer",fontSize:18,padding:"4px 10px",borderRadius:6,color:"#6b7280",lineHeight:1}}>⋮</button>
    {open&&<div style={{position:"absolute",right:0,top:"100%",marginTop:4,background:"#fff",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,0.15)",border:"1px solid #e5e7eb",minWidth:170,zIndex:100,overflow:"hidden",animation:"fadeIn 0.15s ease"}}>
      {actions.map(a=><button key={a.action} onClick={()=>{setOpen(false);onAction(a.action,invoice)}} onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"} onMouseLeave={e=>e.currentTarget.style.background="#fff"} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 16px",border:"none",background:"#fff",cursor:"pointer",fontSize:13,color:a.action==="cancelInvoice"?"#dc2626":"#374151",textAlign:"left",fontWeight:a.action==="cancelInvoice"?600:400}}>
        <span style={{fontSize:14,width:18,textAlign:"center"}}>{a.icon}</span>{a.label}
      </button>)}
    </div>}
  </div>;
}

    ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
    ctx.fillStyle="#dc2626"; ctx.fillRect(0,0,w,50);
    ctx.fillStyle="#fff"; ctx.font="bold 11px sans-serif"; ctx.fillText("Email Notification",14,22);
    ctx.font="9px sans-serif"; ctx.fillText("LHDN e-Invoice",14,38);
    ctx.fillStyle="#f3f4f6"; ctx.fillRect(12,60,w-24,30);
    ctx.fillStyle="#6b7280"; ctx.font="8px sans-serif"; ctx.fillText(`Invoice: ${invoice.id}`,18,78);
    ctx.fillStyle="#e5e7eb"; for(let i=0;i<6;i++){ctx.fillRect(12,100+i*22,w-24,12);}
    ctx.fillStyle="#374151"; ctx.font="bold 10px sans-serif"; ctx.fillText(`Total: MYR ${fmtCurrency(invoice.amount)}`,12,h-20);
    ctx.strokeStyle="#e5e7eb"; ctx.strokeRect(0,0,w,h);
  },[invoice]);
  return <canvas ref={canvasRef} width={200} height={260} style={{borderRadius:6,border:"1px solid #e5e7eb",display:"block"}} />;
}

  useEffect(()=>{if(open)setF(filters)},[open,filters]);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleStatus=s=>setF(p=>{const arr=p.statuses.includes(s)?p.statuses.filter(x=>x!==s):[...p.statuses,s];return{...p,statuses:arr}});
  const is={width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,outline:"none",color:"#374151",boxSizing:"border-box"};
  const ls={fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5};
  return <Modal open={open} onClose={onClose} title="Filter" width={680}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px"}}>

      <div><label style={ls}>Period (Month)</label><select value={f.month} onChange={e=>upd("month",e.target.value)} style={{...is,appearance:"auto",cursor:"pointer"}}><option value="">Select</option>{MONTHS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div><label style={ls}>Period (Year)</label><select value={f.year} onChange={e=>upd("year",e.target.value)} style={{...is,appearance:"auto",cursor:"pointer"}}><option value="">Select</option>{["2024","2025","2026"].map(y=><option key={y} value={y}>{y}</option>)}</select></div>
      <div><label style={ls}>Last Updated</label><input value={f.lastUpdated} onChange={e=>upd("lastUpdated",e.target.value)} placeholder="DD-MM-YYYY - DD-MM-YYYY" style={is}/></div>
      <div><label style={ls}>Submitted Date</label><input value={f.submittedDate} onChange={e=>upd("submittedDate",e.target.value)} placeholder="DD-MM-YYYY - DD-MM-YYYY" style={is}/></div>
      <div><label style={ls}>Updated by</label><input value={f.updatedBy} onChange={e=>upd("updatedBy",e.target.value)} placeholder="Enter email" style={is}/></div>

    <div style={{marginTop:20}}>
      <label style={ls}>Status</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px 0"}}>
        {ALL_STATUSES.map(s=><label key={s} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={f.statuses.includes(s)} onChange={()=>toggleStatus(s)} style={{width:16,height:16,accentColor:"#dc2626",cursor:"pointer"}}/>{s}
        </label>)}
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:12,marginTop:24,paddingTop:20,borderTop:"1px solid #e5e7eb"}}>
      <button onClick={onClose} style={{padding:"10px 24px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151"}}>Cancel</button>
      <button onClick={()=>{onApply(f);onClose()}} style={{padding:"10px 24px",border:"none",borderRadius:8,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Apply</button>
    </div>
  </Modal>;
}

// ── Invoice Content (reusable for both pages) ──
function InvoiceContent({pageTitle,pageSubtitle,notify,mode}) {
  const [invoices,setInvoices]=useState(()=>mode==="realtime"?generateRealtimeInvoices():generateInvoices());
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);
  const [filterModalOpen,setFilterModalOpen]=useState(false);
  const emptyFilters={bizName:"",bizId:"",brandName:"",brandId:"",month:"",year:"",lastUpdated:"",submittedDate:"",updatedBy:"",statuses:[]};
  const [filters,setFilters]=useState(emptyFilters);
  const [quickSearch,setQuickSearch]=useState("");
  const [quickSearchType,setQuickSearchType]=useState("e-Invoice ID");
  const [quickPeriod,setQuickPeriod]=useState("");
  const [quickStatus,setQuickStatus]=useState("");
  const [selected,setSelected]=useState(new Set());
  const [selectedStatus,setSelectedStatus]=useState(null);
  const [detailInvoice,setDetailInvoice]=useState(null);
  const [confirmModal,setConfirmModal]=useState({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false});
  const [sortCol,setSortCol]=useState(null);
  const [sortDir,setSortDir]=useState("asc");

  const activeChips=useMemo(()=>{
    const c=[];
    if(quickStatus)c.push({key:"quickStatus",label:`Status : ${quickStatus}`});
    if(quickPeriod)c.push({key:"quickPeriod",label:`Period : ${quickPeriod}`});
    if(filters.bizName)c.push({key:"bizName",label:`Business : ${filters.bizName}`});
    if(filters.brandName)c.push({key:"brandName",label:`Brand : ${filters.brandName}`});
    if(filters.statuses.length>0)c.push({key:"statuses",label:`Status : ${filters.statuses.join(", ")}`});
    if(filters.month)c.push({key:"month",label:`Month : ${filters.month}`});
    if(filters.year)c.push({key:"year",label:`Year : ${filters.year}`});
    if(filters.updatedBy)c.push({key:"updatedBy",label:`Updated by : ${filters.updatedBy}`});
    return c;
  },[quickStatus,quickPeriod,filters]);

  const removeChip=key=>{if(key==="quickStatus")setQuickStatus("");else if(key==="quickPeriod")setQuickPeriod("");else setFilters(p=>{const n={...p};if(key==="statuses")n.statuses=[];else n[key]="";return n})};
  const resetAllFilters=()=>{setFilters(emptyFilters);setQuickSearch("");setQuickPeriod("");setQuickStatus("");setPage(1)};

  const getSearchPlaceholder=()=>{
    const m={"e-Invoice ID":"Search e-Invoice ID","Business Name":"Search business name","Business ID":"Search business ID","Brand Name":"Search brand name","Brand ID":"Search brand ID"};
    return m[quickSearchType]||"Search...";
  };

  const filtered=useMemo(()=>{
    let r=invoices.filter(inv=>{
      if(quickSearch){
        const q=quickSearch.toLowerCase();
        if(quickSearchType==="e-Invoice ID"&&!inv.id.includes(quickSearch)) return false;
        if(quickSearchType==="Business Name"&&!inv.biz.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Business ID"&&!inv.bus.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Brand Name"&&!inv.brand.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Brand ID"&&!inv.clint.toLowerCase().includes(q)) return false;
      }
      if(quickPeriod&&inv.period!==quickPeriod) return false;
      if(quickStatus&&inv.status!==quickStatus) return false;
      if(filters.bizName&&!inv.biz.toLowerCase().includes(filters.bizName.toLowerCase())) return false;
      if(filters.bizId&&!inv.bus.toLowerCase().includes(filters.bizId.toLowerCase())) return false;
      if(filters.brandName&&!inv.brand.toLowerCase().includes(filters.brandName.toLowerCase())) return false;
      if(filters.brandId&&!inv.clint.toLowerCase().includes(filters.brandId.toLowerCase())) return false;
      if(filters.month&&inv.pMonth!==filters.month) return false;
      if(filters.year&&inv.pYear!==filters.year) return false;
      if(filters.updatedBy&&!inv.updatedBy.toLowerCase().includes(filters.updatedBy.toLowerCase())) return false;
      if(filters.statuses.length>0&&!filters.statuses.includes(inv.status)) return false;
      return true;
    });
    if(sortCol){
      const statusOrder=ALL_STATUSES.reduce((a,s,i)=>({...a,[s]:i}),{});
      const periodOrder=(p)=>{const[m,y]=p.split(" ");return parseInt(y)*100+MONTHS.indexOf(m)};
      r=[...r].sort((a,b)=>{
        let va,vb;
        if(sortCol==="period"){va=periodOrder(a.period);vb=periodOrder(b.period)}
        else if(sortCol==="status"){va=statusOrder[a.status]||0;vb=statusOrder[b.status]||0}
        else if(sortCol==="business"){va=a.biz.toLowerCase();vb=b.biz.toLowerCase()}
        else if(sortCol==="brand"){va=a.brand.toLowerCase();vb=b.brand.toLowerCase()}
        else return 0;
        if(va<vb) return sortDir==="asc"?-1:1;
        if(va>vb) return sortDir==="asc"?1:-1;
        return 0;
      });
    }
    return r;
  },[invoices,quickSearch,quickSearchType,quickPeriod,quickStatus,filters,sortCol,sortDir]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/perPage));
  const pageItems=filtered.slice((page-1)*perPage,page*perPage);
  useEffect(()=>{setPage(1)},[filters,quickSearch,quickSearchType,quickPeriod,quickStatus,perPage]);

  const handleSort=(col)=>{
    if(!["period","status","business","brand"].includes(col)) return;
    if(sortCol===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortCol(col);setSortDir("asc")}
  };

  const handleCheckbox=inv=>{setSelected(prev=>{
    const next=new Set(prev);
    if(next.has(inv.id)){next.delete(inv.id);if(next.size===0)setSelectedStatus(null);return next}
    if(selectedStatus&&inv.status!==selectedStatus){notify("error",`Cannot select invoices with different statuses. First selection is '${selectedStatus}'.`);return prev}
    next.add(inv.id);if(!selectedStatus)setSelectedStatus(inv.status);return next;
  })};

  const handleMasterCheckbox=()=>{
    if(selected.size>0){setSelected(new Set());setSelectedStatus(null);return}
    const first=pageItems[0]; if(!first) return;
    const compat=pageItems.filter(i=>i.status===first.status);
    setSelected(new Set(compat.map(i=>i.id)));setSelectedStatus(first.status);
  };

  const getBulkAction=()=>{
    if(!selectedStatus) return null;
    if(selectedStatus==="Failed to Calculate") return{label:"Retry Calculate",action:"retryCalc"};
    if(selectedStatus==="Failed to Submit") return{label:"Resend",action:"resend"};
    if(selectedStatus==="Submitted") return{label:"Cancel",action:"cancelInvoice"};
    return null;
  };
  const bulkAction=getBulkAction();

  const performAction=(action,invoice)=>{
    const now=new Date().toISOString();
    setInvoices(prev=>prev.map(i=>{
      if(i.id!==invoice.id) return i;
      if(action==="retryCalc"){const t=i.chargeBreakdown.reduce((s,c)=>s+c.amount,0);return{...i,status:"Submitted",amount:t,lastUpdated:now,submittedDate:now,updatedBy:"system@lhdn.gov.my"};}
      if(action==="resend") return{...i,status:"Submitted",lastUpdated:now,submittedDate:now,updatedBy:"system@lhdn.gov.my"};
      if(action==="cancelInvoice") return{...i,status:"Canceled",lastUpdated:now,updatedBy:"system@lhdn.gov.my"};
      return i;
    }));
  };

  const handleAction=(action,invoice)=>{
    if(action==="detail"){setDetailInvoice(invoice);return}
    if(action==="cancelInvoice"){
      const selInvs=[invoice];
      setConfirmModal({open:true,title:"Cancel e-Invoice?",confirmLabel:"Cancel e-Invoice",showTable:true,
        content:<div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{fontSize:20}}>⚠️</span><span style={{fontSize:13,color:"#374151"}}>Review the details before proceeding.</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}>
              <th style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>e-Invoice ID</th><th style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Business</th><th style={{padding:"8px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Brand</th><th style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:"#374151"}}>Total Charge (MYR)</th>
            </tr></thead>
            <tbody>{selInvs.map(si=><tr key={si.id}><td style={{padding:"8px 10px"}}>{si.id}</td><td style={{padding:"8px 10px"}}>{si.biz}<br/><span style={{color:"#9ca3af",fontSize:11}}>{si.bus}</span></td><td style={{padding:"8px 10px"}}>{si.brand}<br/><span style={{color:"#9ca3af",fontSize:11}}>{si.clint}</span></td><td style={{padding:"8px 10px",textAlign:"right"}}>{fmtCurrency(si.amount)}</td></tr>)}</tbody>
          </table>
        </div>,
        onConfirm:()=>{performAction("cancelInvoice",invoice);notify("success",`E-Invoice ${invoice.id} has been canceled`);setConfirmModal({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false});setDetailInvoice(null);setSelected(new Set());setSelectedStatus(null)}
      });
      return;
    }
    const titles={retryCalc:"Retry Calculate",resend:"Resend"};
    setConfirmModal({open:true,title:titles[action]||action,confirmLabel:titles[action],showTable:false,
      content:<div style={{background:"#f9fafb",padding:16,borderRadius:8,display:"grid",gridTemplateColumns:"120px 1fr",gap:"8px 14px",fontSize:13}}>
        <span style={{color:"#6b7280"}}>e-Invoice ID</span><span style={{fontWeight:600}}>{invoice.id}</span>
        <span style={{color:"#6b7280"}}>Business</span><span style={{fontWeight:600}}>{invoice.biz}</span>
        <span style={{color:"#6b7280"}}>Brand</span><span style={{fontWeight:600}}>{invoice.brand}</span>
        <span style={{color:"#6b7280"}}>Period</span><span style={{fontWeight:600}}>{invoice.period}</span>
        <span style={{color:"#6b7280"}}>Status</span><span><StatusBadge status={invoice.status}/></span>
      </div>,
      onConfirm:()=>{performAction(action,invoice);const msg=action==="retryCalc"?`Calculation completed. Invoice ${invoice.id} is now Submitted`:`E-Invoice ${invoice.id} has been resent`;notify("success",msg);setConfirmModal({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false});setDetailInvoice(null);setSelected(new Set());setSelectedStatus(null)}
    });
  };

  const handleBulkAction=()=>{
    if(!bulkAction||selected.size===0) return;
    const ids=[...selected];
    const selInvs=invoices.filter(i=>ids.includes(i.id));
    if(bulkAction.action==="cancelInvoice"){
      setConfirmModal({open:true,title:"Cancel e-Invoice?",confirmLabel:"Cancel e-Invoice",showTable:true,
        content:<div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{fontSize:20}}>⚠️</span><span style={{fontSize:13,color:"#374151"}}>Review the details before proceeding.</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}><th style={{padding:"8px 10px",textAlign:"left",fontWeight:600}}>e-Invoice ID</th><th style={{padding:"8px 10px",textAlign:"left",fontWeight:600}}>Business</th><th style={{padding:"8px 10px",textAlign:"left",fontWeight:600}}>Brand</th><th style={{padding:"8px 10px",textAlign:"right",fontWeight:600}}>Total Charge (MYR)</th></tr></thead>
            <tbody>{selInvs.map(si=><tr key={si.id} style={{borderBottom:"1px solid #f3f4f6"}}><td style={{padding:"8px 10px"}}>{si.id}</td><td style={{padding:"8px 10px"}}>{si.biz}<br/><span style={{color:"#9ca3af",fontSize:11}}>{si.bus}</span></td><td style={{padding:"8px 10px"}}>{si.brand}<br/><span style={{color:"#9ca3af",fontSize:11}}>{si.clint}</span></td><td style={{padding:"8px 10px",textAlign:"right"}}>{fmtCurrency(si.amount)}</td></tr>)}</tbody>
          </table>
        </div>,
        onConfirm:()=>{const now=new Date().toISOString();setInvoices(prev=>prev.map(i=>ids.includes(i.id)?{...i,status:"Canceled",lastUpdated:now,updatedBy:"system@lhdn.gov.my"}:i));notify("success",`${ids.length} e-Invoices Canceled`);setSelected(new Set());setSelectedStatus(null);setConfirmModal({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false})}
      });
    } else {
      setConfirmModal({open:true,title:`${bulkAction.label} (${ids.length} invoices)`,confirmLabel:bulkAction.label,showTable:false,
        content:<div style={{fontSize:13,color:"#374151"}}><p style={{margin:0}}>You are about to <strong>{bulkAction.label.toLowerCase()}</strong> {ids.length} e-Invoice(s).</p><p style={{marginTop:10,marginBottom:0}}>Do you want to proceed?</p></div>,
        onConfirm:()=>{const now=new Date().toISOString();setInvoices(prev=>prev.map(i=>{if(!ids.includes(i.id))return i;if(bulkAction.action==="retryCalc"){const t=i.chargeBreakdown.reduce((s,c)=>s+c.amount,0);return{...i,status:"Submitted",amount:t,lastUpdated:now,submittedDate:now,updatedBy:"system@lhdn.gov.my"}}if(bulkAction.action==="resend")return{...i,status:"Submitted",lastUpdated:now,submittedDate:now,updatedBy:"system@lhdn.gov.my"};return i}));notify("success",`Successfully processed ${ids.length} invoice(s)`);setSelected(new Set());setSelectedStatus(null);setConfirmModal({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false})}
      });
    }
  };

  const periods=useMemo(()=>[...new Set(invoices.map(i=>i.period))].sort(),[invoices]);
  const isRowDim=inv=>selectedStatus&&inv.status!==selectedStatus;

  const SortIcon=({col})=>{
    const active=sortCol===col;
    const sortable=["period","status","business","brand"].includes(col);
    return <span onClick={sortable?(e)=>{e.stopPropagation();handleSort(col)}:undefined} style={{cursor:sortable?"pointer":"default",marginLeft:4,fontSize:9,color:"#d1d5db",userSelect:"none",display:"inline-flex",flexDirection:"column",lineHeight:0.8,verticalAlign:"middle"}}>
      <span style={{color:active&&sortDir==="asc"?"#dc2626":"#d1d5db"}}>▲</span>
      <span style={{color:active&&sortDir==="desc"?"#dc2626":"#d1d5db"}}>▼</span>
    </span>;
  };

  return <>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"28px 32px 0",background:"#fff"}}>
          <h1 style={{fontSize:22,fontWeight:700,color:"#111827",marginBottom:4}}>{pageTitle}</h1>
          <p style={{fontSize:13,color:"#9ca3af",marginBottom:24}}>{pageSubtitle}</p>

          {/* Quick Filter Bar */}
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:12}}>
            <div style={{display:"flex"}}>
              <select value={quickSearchType} onChange={e=>{setQuickSearchType(e.target.value);setQuickSearch("")}} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:"6px 0 0 6px",fontSize:13,background:"#f9fafb",color:"#374151",cursor:"pointer",outline:"none",appearance:"auto",borderRight:"none"}}>
                {SEARCH_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <input value={quickSearch} onChange={e=>setQuickSearch(e.target.value)} placeholder={getSearchPlaceholder()} style={{padding:"9px 14px",border:"1px solid #d1d5db",borderRadius:"0 6px 6px 0",fontSize:13,outline:"none",color:"#374151",width:180}}/>
            </div>
            <select value={quickPeriod} onChange={e=>setQuickPeriod(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickPeriod?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:140,appearance:"auto",background:"#fff"}}>
              <option value="">Select Period</option>{periods.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select value={quickStatus} onChange={e=>setQuickStatus(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickStatus?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:150,appearance:"auto",background:"#fff"}}>
              <option value="">Select Status</option>{ALL_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <button onClick={()=>setFilterModalOpen(true)} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",border:"1px solid #d1d5db",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Filter <span style={{fontSize:11,color:"#9ca3af"}}>▼</span></button>
            {activeChips.length>0&&<span onClick={resetAllFilters} style={{color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:500,whiteSpace:"nowrap"}}>Reset Filter</span>}
          </div>
          {activeChips.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {activeChips.map(chip=><span key={chip.key} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:999,background:"#f3f4f6",fontSize:12,color:"#374151",border:"1px solid #e5e7eb"}}>
              {chip.label}<button onClick={()=>removeChip(chip.key)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#9ca3af",padding:0,lineHeight:1}}>✕</button>
            </span>)}
          </div>}
          {selected.size>0&&<div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <span style={{fontSize:13,color:"#374151",fontWeight:500}}>{selected.size} e-Invoice ID(s) selected</span>
            {bulkAction&&<button onClick={handleBulkAction} style={{padding:"8px 20px",border:"none",borderRadius:6,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>{bulkAction.label}</button>}
          </div>}
        </div>
        <div style={{padding:"0 32px 24px",background:"#fff"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:1200}}>
              <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>
                <th style={{width:40,padding:"14px 6px"}}><input type="checkbox" checked={selected.size>0&&pageItems.length>0&&pageItems.filter(i=>!selectedStatus||i.status===selectedStatus).every(i=>selected.has(i.id))} onChange={handleMasterCheckbox} style={{width:17,height:17,cursor:"pointer",accentColor:"#dc2626"}}/></th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>e-Invoice ID</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>handleSort("business")}>Business <SortIcon col="business"/></th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>handleSort("brand")}>Brand <SortIcon col="brand"/></th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>handleSort("period")}>Period <SortIcon col="period"/></th>
                <th style={{padding:"14px 10px",textAlign:"right",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Total Charge (MYR)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap",cursor:"pointer"}} onClick={()=>handleSort("status")}>Status <SortIcon col="status"/></th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Submitted Date (GMT+8)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Last Updated (GMT+8)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Updated By</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",position:"sticky",right:0,background:"#fff",zIndex:2,boxShadow:"-4px 0 8px rgba(0,0,0,0.04)"}}>Action</th>
              </tr></thead>
              <tbody>
                {pageItems.length===0?<tr><td colSpan={11} style={{padding:60,textAlign:"center",color:"#9ca3af"}}>No invoices found</td></tr>
                :pageItems.map(inv=>{
                  const isSel=selected.has(inv.id);const isDim=isRowDim(inv);
                  return <tr key={inv.id} style={{borderBottom:"1px solid #f3f4f6",opacity:isDim?0.35:1,background:isSel?"#fef2f2":"transparent",transition:"background 0.15s"}}
                    onMouseEnter={e=>{if(!isSel&&!isDim)e.currentTarget.style.background="#fafafa"}} onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background="transparent"}}>
                    <td style={{padding:"16px 6px"}}><input type="checkbox" checked={isSel} disabled={isDim} onChange={()=>handleCheckbox(inv)} style={{width:17,height:17,cursor:isDim?"not-allowed":"pointer",accentColor:"#dc2626"}}/></td>
                    <td style={{padding:"16px 10px",fontWeight:500,color:"#111827"}}>{inv.id}</td>
                    <td style={{padding:"16px 10px"}}><div style={{color:"#111827",fontWeight:500}}>{inv.biz}</div><div style={{color:"#9ca3af",fontSize:11,marginTop:1}}>{inv.bus}</div></td>
                    <td style={{padding:"16px 10px",maxWidth:180}}><div style={{color:"#111827",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.brand}</div><div style={{color:"#9ca3af",fontSize:11,marginTop:1}}>{inv.clint}</div></td>
                    <td style={{padding:"16px 10px",color:"#374151",whiteSpace:"nowrap"}}>{inv.period}</td>
                    <td style={{padding:"16px 10px",textAlign:"right",fontWeight:500,color:inv.amount!=null?"#111827":"#d1d5db",whiteSpace:"nowrap"}}>{inv.amount!=null?fmtCurrency(inv.amount):"-"}</td>
                    <td style={{padding:"16px 10px"}}><StatusBadge status={inv.status}/></td>
                    <td style={{padding:"16px 10px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDatetime(inv.submittedDate)}</td>
                    <td style={{padding:"16px 10px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDatetime(inv.lastUpdated)}</td>
                    <td style={{padding:"16px 10px",color:"#6b7280",fontSize:12}}>{inv.updatedBy||"-"}</td>
                    <td style={{padding:"16px 10px",position:"sticky",right:0,background:isSel?"#fef2f2":"#fff",zIndex:1,boxShadow:"-4px 0 8px rgba(0,0,0,0.04)"}}><KebabMenu invoice={inv} onAction={handleAction}/></td>
                  </tr>;})}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 0",borderTop:"3px solid #dc2626"}}>
            <select value={perPage} onChange={e=>setPerPage(Number(e.target.value))} style={{padding:"7px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:"#374151",cursor:"pointer",outline:"none",appearance:"auto",background:"#fff"}}>
              {[5,10,25].map(n=><option key={n} value={n}>{n} items per page</option>)}
            </select>
            <div style={{display:"flex",alignItems:"center",gap:12,fontSize:13,color:"#6b7280"}}>
              <span>Showing {filtered.length===0?0:(page-1)*perPage+1} - {Math.min(page*perPage,filtered.length)} from {filtered.length} entries</span>
              <div style={{display:"flex",alignItems:"center",gap:2}}>
                <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===1?"not-allowed":"pointer",fontSize:18,color:page===1?"#e5e7eb":"#9ca3af",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
                {Array.from({length:totalPages},(_,i)=>i+1).slice(0,7).map(p=><button key={p} onClick={()=>setPage(p)} style={{width:32,height:32,border:"none",borderRadius:6,background:page===p?"#dc2626":"transparent",color:page===p?"#fff":"#6b7280",cursor:"pointer",fontSize:13,fontWeight:page===p?700:400,display:"flex",alignItems:"center",justifyContent:"center"}}>{p}</button>)}
                <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===totalPages?"not-allowed":"pointer",fontSize:18,color:page===totalPages?"#e5e7eb":"#9ca3af",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <FilterModal open={filterModalOpen} onClose={()=>setFilterModalOpen(false)} onApply={setFilters} filters={filters}/>
    {detailInvoice&&<DetailModal invoice={detailInvoice} onClose={()=>setDetailInvoice(null)} onAction={(a,i)=>{setDetailInvoice(null);handleAction(a,i)}} mode={mode}/>}
    <ConfirmDialog open={confirmModal.open} onClose={()=>setConfirmModal({open:false,title:"",content:null,onConfirm:null,confirmLabel:"",showTable:false})} onConfirm={confirmModal.onConfirm} title={confirmModal.title} confirmLabel={confirmModal.confirmLabel} showTable={confirmModal.showTable}>{confirmModal.content}</ConfirmDialog>
  </>;
}

  const [notifications,setNotifications]=useState([]);
  const notify=useCallback((type,message)=>{const id=Date.now()+Math.random();setNotifications(p=>[...p,{id,type,message}]);setTimeout(()=>setNotifications(p=>p.filter(n=>n.id!==id)),4000)},[]);

  const pages={monthly:{title:"Monthly Consolidated",subtitle:"Monitor monthly consolidated e-Invoice submission here"},realtime:{title:"Real Time Invoice",subtitle:"Monitor real-time e-Invoice submission here"}};
  const subMenuStyle=(key)=>({padding:"9px 16px",fontSize:13,cursor:"pointer",borderRadius:"0 4px 4px 0",marginBottom:2,transition:"all 0.15s",
    ...(activePage===key?{color:"#dc2626",fontWeight:600,borderLeft:"3px solid #dc2626",background:"#fef2f2"}:{color:"#6b7280",fontWeight:400,borderLeft:"3px solid transparent",background:"transparent"})});

  return <div style={{display:"flex",height:"100vh",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif",background:"#f5f5f5",overflow:"hidden"}}>

      @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

    <Notifications items={notifications} onDismiss={id=>setNotifications(p=>p.filter(n=>n.id!==id))}/>
    <div style={{width:sidebarOpen?250:56,background:"#fff",borderRight:"1px solid #e5e7eb",display:"flex",flexDirection:"column",flexShrink:0,transition:"width 0.25s ease",overflow:"hidden"}}>
      <div style={{padding:"10px",borderBottom:"1px solid #f3f4f6",display:"flex",alignItems:"center",justifyContent:sidebarOpen?"space-between":"center",minWidth:sidebarOpen?250:0}}>
        {sidebarOpen&&<div style={{width:36,height:36,background:"#dc2626",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0,marginLeft:10}}>RU</div>}
        <span onClick={()=>setSidebarOpen(!sidebarOpen)} style={{cursor:"pointer",fontSize:20,color:"#6b7280",padding:"6px 8px",borderRadius:6,border:"1px solid #e5e7eb",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginRight:sidebarOpen?10:0}}>☰</span>
      </div>
      {sidebarOpen&&<>
      <div style={{padding:"12px 20px",borderBottom:"1px solid #f3f4f6"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:999,background:"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#dc2626"}}>A</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:"#111827"}}>ACME</div><div style={{fontSize:11,color:"#9ca3af"}}>Internal Dashboard 📋</div></div>
          <span style={{color:"#9ca3af",fontSize:14,cursor:"pointer"}}>▾</span>
        </div>
      </div>
      <div style={{padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #f3f4f6"}}>
        <span style={{fontSize:12,color:"#6b7280",border:"1px solid #e5e7eb",borderRadius:4,padding:"3px 10px"}}>English</span>
        <span style={{cursor:"pointer",fontSize:16}}>🔔</span>
      </div>
      <nav style={{flex:1,padding:"8px 0",overflowY:"auto"}}>
        <div style={{padding:"10px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13,color:"#6b7280"}}><span>🏠</span>Dashboard</div>
        <div>
          <div onClick={()=>setMonitoringOpen(!monitoringOpen)} style={{padding:"10px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13,color:"#dc2626",fontWeight:600}}>
            <span style={{width:22,height:22,background:"#fee2e2",borderRadius:4,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11}}>📊</span>Monitoring

          {monitoringOpen&&<div style={{paddingLeft:48}}>

        <div><div style={{fontSize:13,fontWeight:700,color:"#111827"}}>John Doe</div><div style={{fontSize:11,color:"#9ca3af"}}>ACME FinOps</div></div>

  </div>;
}

// ── Password Gate ──
function PasswordGate() {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState("");
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);

  const handleSubmit = () => {
    if (pw === "MYeinvoice") {
      setError(false);
      setAuthed(true);
    } else {
      setError(true);
      setPw("");
    }
  };

  if (authed) return <LHDNApp />;

  return (
    <div style={{
      height: "100vh", width: "100vw", display: "flex", alignItems: "center", justifyContent: "center",
      background: "linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%)",
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",
      position: "relative", overflow: "hidden",
    }}>
      {/* Subtle background pattern */}
      <div style={{ position: "absolute", inset: 0, opacity: 0.04, backgroundImage: "radial-gradient(circle at 1px 1px, white 1px, transparent 0)", backgroundSize: "40px 40px" }} />

      <div style={{
        background: "#fff", borderRadius: 16, padding: "48px 44px", width: 400, maxWidth: "90vw",
        boxShadow: "0 25px 60px rgba(0,0,0,0.4)", position: "relative", zIndex: 1,
        animation: "fadeIn 0.4s ease",
      }}>
        <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`}</style>

        {/* Logo */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 28 }}>
          <div style={{
            width: 56, height: 56, background: "#dc2626", borderRadius: 14,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#fff", fontWeight: 800, fontSize: 22, boxShadow: "0 4px 16px rgba(220,38,38,0.35)",
          }}>RU</div>
        </div>

        <h1 style={{ textAlign: "center", fontSize: 20, fontWeight: 700, color: "#111827", marginBottom: 6 }}>
          LHDN e-Invoice System
        </h1>
        <p style={{ textAlign: "center", fontSize: 13, color: "#9ca3af", marginBottom: 32 }}>
          Enter password to access the dashboard
        </p>

        {/* Password Field */}
        <div style={{ marginBottom: 20 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 6 }}>Password</label>
          <div style={{
            display: "flex", border: `2px solid ${error ? "#ef4444" : "#e5e7eb"}`, borderRadius: 10, overflow: "hidden",
            transition: "border-color 0.2s",
            animation: error ? "shake 0.4s ease" : "none",
          }}
            onFocus={e => { if (!error) e.currentTarget.style.borderColor = "#dc2626" }}
            onBlur={e => { if (!error) e.currentTarget.style.borderColor = "#e5e7eb" }}>
            <div style={{ padding: "0 14px", display: "flex", alignItems: "center", color: "#9ca3af", fontSize: 18, background: "#f9fafb", borderRight: "1px solid #e5e7eb" }}>🔒</div>
            <input
              type={show ? "text" : "password"}
              value={pw}
              onChange={e => { setPw(e.target.value); setError(false) }}
              onKeyDown={e => { if (e.key === "Enter") handleSubmit() }}
              placeholder="Enter password"
              autoFocus
              style={{
                flex: 1, border: "none", outline: "none", padding: "13px 14px", fontSize: 14, color: "#111827",
                background: "transparent",
              }}
            />
            <button onClick={() => setShow(!show)} style={{
              background: "none", border: "none", cursor: "pointer", padding: "0 14px",
              color: "#9ca3af", fontSize: 16, display: "flex", alignItems: "center",
            }}>{show ? "🙈" : "👁"}</button>
          </div>
          {error && (
            <div style={{ fontSize: 12, color: "#ef4444", marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
              <span>⚠</span> Incorrect password. Please try again.
            </div>
          )}
        </div>

        {/* Submit */}
        <button onClick={handleSubmit} style={{
          width: "100%", padding: "13px 0", border: "none", borderRadius: 10,
          background: pw.length > 0 ? "#dc2626" : "#fca5a5",
          color: "#fff", fontSize: 14, fontWeight: 700, cursor: pw.length > 0 ? "pointer" : "not-allowed",
          transition: "background 0.2s", letterSpacing: 0.3,
          boxShadow: pw.length > 0 ? "0 4px 14px rgba(220,38,38,0.3)" : "none",
        }}>
          Access Dashboard
        </button>

        <p style={{ textAlign: "center", fontSize: 11, color: "#d1d5db", marginTop: 24 }}>
          Authorized personnel only
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PasswordGate));
  </script>
</body>
</html>
