const fmtDatetime = (iso) => { if(!iso) return "-"; const d=new Date(iso); const day=d.getDate(); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; return `${day} ${ms[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const fmtDateFull = (d) => { const day=String(d.getDate()).padStart(2,"0"); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; return `${day} ${ms[d.getMonth()]} ${d.getFullYear()}`; };
const getChargePeriod = (period) => { const [m,y]=period.split(" "); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; const mi=ms.indexOf(m); return `${fmtDateFull(new Date(+y,mi,1))} - ${fmtDateFull(new Date(+y,mi+1,0))}`; };
const getInvoiceDate = (period) => { const [m,y]=period.split(" "); const ms=["January","February","March","April","May","June","July","August","September","October","November","December"]; const mi=ms.indexOf(m); return fmtDateFull(new Date(+y,mi+1,1)); };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// Phase 1 cancel window: Submitted ≤ 3 days
const isSubmittedOver3Days = (inv) => { if(inv.status!=="Submitted"||!inv.submittedDate) return false; return (NOW-new Date(inv.submittedDate))/(1000*60*60*24)>3; };

// Phase 2 — correction-window helpers (per answers C6 + A2 + C12)
const lastDayOfMonthFromIso = (iso) => { const d=new Date(iso); return new Date(d.getFullYear(), d.getMonth()+1, 0, 23, 59, 59); };
// Returns true if the original invoice is within the window where a NEW CN/DN can be created (3 days after submittedDate ≤ now ≤ end of submittedDate's month)
const correctionWindowOpenForOriginal = (orig) => {
  if (!orig.submittedDate) return false;
  const sub = new Date(orig.submittedDate);
  const startWindow = new Date(sub.getTime() + 3*86400000);
  const endWindow = lastDayOfMonthFromIso(orig.submittedDate);
  return NOW >= startWindow && NOW <= endWindow;
};
// Returns true if a CN/DN row can still be edited / cross-converted (per C12: 3-day rule does NOT apply, only end-of-month from the original)
const correctionEditWindowOpen = (origInvoice) => {
  if (!origInvoice || !origInvoice.submittedDate) return false;
  return NOW <= lastDayOfMonthFromIso(origInvoice.submittedDate);
};

// ── Phase 2 Kebab Menu ──
function KebabMenu({invoice, onAction, mode, originalsCorrectedSet, allInvoices}) {
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  const actions=[];
  const s=invoice.status;
  const isOriginal = !invoice.prefix;
  const isCN = invoice.prefix==="CN";
  const isDN = invoice.prefix==="DN";
  const monthlyAllowed = mode==="monthly"; // Realtime: per D1, no CN/DN
  actions.push({label:"View Details",icon:"👁",action:"detail"});

  if (isOriginal) {
    if (s==="Failed to Calculate") actions.push({label:"Retry Calculate",icon:"🔄",action:"retryCalc"});
    if (s==="Failed to Submit") actions.push({label:"Resend",icon:"↩",action:"resend"});
    if (s==="Submitted" && !isSubmittedOver3Days(invoice)) actions.push({label:"Cancel",icon:"✕",action:"cancelInvoice"});

    // Phase 2 — original eligible for CN/DN (Rejected, Cleared, Canceled within window AND not yet corrected)
    if (monthlyAllowed && CORRECTABLE_ORIGINAL_STATUSES.includes(s) && correctionWindowOpenForOriginal(invoice) && !originalsCorrectedSet.has(invoice.id)) {
      actions.push({label:"Add Credit Note",icon:"➖",action:"addCN"});
      actions.push({label:"Add Debit Note",icon:"➕",action:"addDN"});
    }
    if (s==="Corrected" && invoice.correctedBy) {
      actions.push({label:"View Correction",icon:"🔗",action:"viewCorrection"});
    }
  } else if (s !== "Superseded" && monthlyAllowed) {
    // Correction row (CN/DN). Per B8: in-flight Submitted CN/DN cannot be canceled — but a Retry is allowed.
    if (s==="Submitted") actions.push({label:"Retry Submission",icon:"↻",action:"retrySubmit"});
    if (s==="Failed to Submit") actions.push({label:"Resend",icon:"↩",action:"resend"});
    if (s==="Failed to Calculate") actions.push({label:"Retry Calculate",icon:"🔄",action:"retryCalc"});

    // Update / cross-convert: per C12 the 3-day rule does NOT apply; only end-of-month-from-original window does.
    const orig = allInvoices.find(i=>i.id===invoice.originalId);
    if (FAILED_CORRECTION_STATUSES.includes(s) && correctionEditWindowOpen(orig)) {
      if (isCN) {
        actions.push({label:"Update Credit Note",icon:"✎",action:"updateCN"});
        actions.push({label:"Add Debit Note",icon:"➕",action:"convertToDN"});
      }
      if (isDN) {
        actions.push({label:"Update Debit Note",icon:"✎",action:"updateDN"});
        actions.push({label:"Add Credit Note",icon:"➖",action:"convertToCN"});
      }
    }
  }

  return <div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(!open)} style={{background:open?"#f3f4f6":"#fff",border:"1px solid #e5e7eb",cursor:"pointer",fontSize:18,padding:"4px 10px",borderRadius:6,color:"#6b7280",lineHeight:1}}>⋮</button>
    {open&&<div style={{position:"absolute",right:0,top:"100%",marginTop:4,background:"#fff",borderRadius:8,boxShadow:"0 8px 30px rgba(0,0,0,0.15)",border:"1px solid #e5e7eb",minWidth:200,zIndex:100,overflow:"hidden",animation:"fadeIn 0.15s ease"}}>
      {actions.map(a=><button key={a.action} onClick={()=>{setOpen(false);onAction(a.action,invoice)}} onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"} onMouseLeave={e=>e.currentTarget.style.background="#fff"} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 16px",border:"none",background:"#fff",cursor:"pointer",fontSize:13,color:a.action==="cancelInvoice"?"#dc2626":(a.action==="addCN"||a.action==="addDN"||a.action==="convertToCN"||a.action==="convertToDN"||a.action==="updateCN"||a.action==="updateDN"?"#6d28d9":"#374151"),textAlign:"left",fontWeight:(a.action==="cancelInvoice"||a.action.startsWith("add")||a.action.startsWith("convert")||a.action.startsWith("update"))?600:400}}>
        <span style={{fontSize:14,width:18,textAlign:"center"}}>{a.icon}</span>{a.label}
      </button>)}
    </div>}
  </div>;
}

// ── Document Thumbnail ──
function DocThumbnail({invoice}) {
  const canvasRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    const ctx=c.getContext("2d"); const w=200,h=260;
    ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
    const headerColor = invoice.prefix==="CN"?"#0d9488":(invoice.prefix==="DN"?"#6d28d9":"#dc2626");
    ctx.fillStyle=headerColor; ctx.fillRect(0,0,w,40);
    ctx.fillStyle="#fff"; ctx.font="bold 11px sans-serif";
    const docTitle = invoice.prefix==="CN"?"Credit Note":(invoice.prefix==="DN"?"Debit Note":"e-Invoice");
    ctx.fillText(`DOKU MY ${docTitle}`,10,18);
    ctx.font="9px sans-serif"; ctx.fillText("Simplepay Gateway Sdn Bhd",10,32);
    ctx.fillStyle="#374151"; ctx.font="bold 9px sans-serif"; ctx.fillText(`Doc No: ${invoice.id}`,10,56);
    if (invoice.originalId) { ctx.fillStyle="#6b7280"; ctx.font="7.5px sans-serif"; ctx.fillText(`Ref Original: ${invoice.originalId}`,10,67); }
    ctx.fillStyle="#6b7280"; ctx.font="8px sans-serif"; ctx.fillText(`Date: ${getInvoiceDate(invoice.period)}`,10,80);
    ctx.fillText(`Buyer: ${(invoice.biz||"").slice(0,22)}`,10,92);
    ctx.fillStyle="#f3f4f6"; ctx.fillRect(8,100,w-16,12);
    ctx.fillStyle="#374151"; ctx.font="bold 8px sans-serif"; ctx.fillText("Description",12,109); ctx.fillText("Amount",w-50,109);
    ctx.fillStyle="#9ca3af"; ctx.font="7.5px sans-serif";
    (invoice.chargeBreakdown||[]).slice(0,4).forEach((c,i)=>{
      ctx.fillText(("Transaction Fee - "+c.channel).slice(0,28),10,124+i*14);
      ctx.fillText(fmtCurrency(c.amount),w-58,124+i*14);
    });
    ctx.fillStyle="#374151"; ctx.font="bold 9px sans-serif"; ctx.fillText(`Total: MYR ${fmtCurrency(invoice.amount)}`,10,h-50);
    if(invoice.status==="Cleared"){
      ctx.fillStyle="#111";
      for(let i=0;i<8;i++) for(let j=0;j<8;j++) if((i*j)%3===0) ctx.fillRect(w-50+i*4,h-40+j*4,3,3);
      ctx.font="6px sans-serif"; ctx.fillStyle="#6b7280"; ctx.fillText("IRBM Verified",w-50,h-6);
    } else {
      ctx.fillStyle="#fef2f2"; ctx.fillRect(w-58,h-44,52,40);
      ctx.fillStyle="#9ca3af"; ctx.font="6px sans-serif"; ctx.fillText("Pending QR",w-50,h-22);
    }
    ctx.strokeStyle="#e5e7eb"; ctx.strokeRect(0,0,w,h);
  },[invoice]);
  return <canvas ref={canvasRef} width={200} height={260} style={{borderRadius:6,border:"1px solid #e5e7eb",display:"block"}} />;
}

// ── Phase 2 Correction Dialog ──
// Replace mode (A4). 2-decimal limit (C7). CN ≤ original; DN ≥ original (A6 — at-or-above).
function CorrectionDialog({open, mode, kind, originalInvoice, currentInvoice, onClose, onSubmit}) {
  if(!open) return null;
  const original = originalInvoice.chargeBreakdown;
  // Pre-fill: update mode → with current correction values; create mode → with original values (also for cross-conversion)
  const startVals = (mode==="update" && currentInvoice) ? currentInvoice.chargeBreakdown.map(c=>c.amount) : original.map(c=>c.amount);
  const [vals,setVals]=useState(()=>startVals.map(v=>String(v.toFixed(2))));
  const [reason,setReason]=useState("");
  useEffect(()=>{if(open) setVals(startVals.map(v=>String(v.toFixed(2))));},[open]);

  const setVal = (i,v) => {
    // C7: max 2 decimal digits + only digits + optional decimal point
    if (v==="" || /^\d*(\.\d{0,2})?$/.test(v)) {
      const a=[...vals]; a[i]=v; setVals(a);
    }
  };
  const numeric = vals.map(v=>{const n=parseFloat(v); return isNaN(n)?null:n;});
  const errors = numeric.map((n,i)=>{
    if(n===null||n<0) return "Amount must be ≥ 0";
    if(kind==="CN" && n>original[i].amount) return `CN cannot exceed original (MYR ${fmtCurrency(original[i].amount)})`;
    if(kind==="DN" && n<original[i].amount) return `DN must be at-or-above original (MYR ${fmtCurrency(original[i].amount)})`;
    return null;
  });
  const totalNew = numeric.reduce((a,n)=>a+(n||0),0);
  const totalOriginal = original.reduce((a,c)=>a+c.amount,0);
  const anyDiff = numeric.some((n,i)=>n!==null && n!==original[i].amount);
  const anyError = errors.some(e=>e);
  const canSubmit = !anyError && anyDiff;
  const headerColor = kind==="CN"?"#0d9488":"#6d28d9";
  const dialogTitle = `${mode==="update"?"Update":"Create"} ${kind==="CN"?"Credit Note":"Debit Note"}`;

  return <Modal open={true} onClose={onClose} title={dialogTitle} width={760}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px 16px",marginBottom:14,fontSize:13}}>
      <div><div style={{fontSize:11,color:"#9ca3af"}}>Original e-Invoice ID</div><div style={{fontWeight:700,color:"#111827"}}>{originalInvoice.id}</div></div>
      <div><div style={{fontSize:11,color:"#9ca3af"}}>{kind==="CN"?"Credit Note":"Debit Note"} ID</div><div style={{fontWeight:700,color:headerColor}}>{kind}-{originalInvoice.id}</div></div>
      <div><div style={{fontSize:11,color:"#9ca3af"}}>Period</div><div style={{fontWeight:700,color:"#111827"}}>{originalInvoice.period}</div></div>
    </div>
    <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#5b21b6"}}>
      <strong>Rule:</strong> {kind==="CN"?"Credit Note amounts must be at most the original per channel (downward correction).":"Debit Note amounts must be at-or-above the original per channel (upward correction)."} The corrected document will be submitted to Taxilla under the same business identity. Max 2 decimal places.
    </div>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}>
        <th style={{textAlign:"left",padding:"8px 10px",fontWeight:600,color:"#374151"}}>Payment Channel</th>
        <th style={{textAlign:"right",padding:"8px 10px",fontWeight:600,color:"#374151"}}>Original (MYR)</th>
        <th style={{textAlign:"right",padding:"8px 10px",fontWeight:600,color:"#374151"}}>Corrected (MYR)</th>
        <th style={{textAlign:"right",padding:"8px 10px",fontWeight:600,color:"#374151"}}>Difference</th>
      </tr></thead>
      <tbody>{original.map((c,i)=>{
        const orig = c.amount;
        const n = numeric[i];
        const diff = n!==null ? n-orig : null;
        return <tr key={i} style={{borderBottom:"1px solid #f3f4f6"}}>
          <td style={{padding:"8px 10px",color:"#374151"}}>{c.channel}</td>
          <td style={{padding:"8px 10px",textAlign:"right",color:"#6b7280"}}>{fmtCurrency(orig)}</td>
          <td style={{padding:"8px 10px",textAlign:"right"}}>
            <input value={vals[i]} onChange={e=>setVal(i,e.target.value)} inputMode="decimal" style={{width:130,padding:"6px 8px",border:`1px solid ${errors[i]?"#dc2626":"#d1d5db"}`,borderRadius:6,fontSize:13,textAlign:"right",outline:"none"}}/>
            {errors[i]&&<div style={{fontSize:10,color:"#dc2626",marginTop:2}}>{errors[i]}</div>}
          </td>
          <td style={{padding:"8px 10px",textAlign:"right",color:diff===null?"#9ca3af":(diff<0?"#dc2626":(diff>0?"#16a34a":"#9ca3af")),fontWeight:600}}>
            {diff===null?"-":(diff>0?"+":"")+"MYR "+fmtCurrency(diff)}
          </td>
        </tr>;
      })}
        <tr style={{fontWeight:700,background:"#fafafa"}}>
          <td style={{padding:"10px",color:"#111827"}}>Total</td>
          <td style={{padding:"10px",textAlign:"right",color:"#6b7280"}}>{fmtCurrency(totalOriginal)}</td>
          <td style={{padding:"10px",textAlign:"right",color:"#111827"}}>MYR {fmtCurrency(totalNew)}</td>
          <td style={{padding:"10px",textAlign:"right",color:totalNew-totalOriginal<0?"#dc2626":(totalNew-totalOriginal>0?"#16a34a":"#9ca3af")}}>{(totalNew-totalOriginal)>0?"+":""}MYR {fmtCurrency(totalNew-totalOriginal)}</td>
        </tr>
      </tbody>
    </table>
    <div style={{marginTop:18}}>
      <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5}}>Reason for correction <span style={{color:"#9ca3af",fontWeight:400}}>(optional)</span></label>
      <textarea value={reason} onChange={e=>setReason(e.target.value)} rows={2} placeholder="e.g., Late chargeback reconciliation; missed channel split" style={{width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
    </div>
    <div style={{display:"flex",justifyContent:"flex-end",gap:12,marginTop:24,paddingTop:18,borderTop:"1px solid #e5e7eb"}}>
      <button onClick={onClose} style={{padding:"10px 24px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151"}}>Cancel</button>
      <button onClick={()=>{if(canSubmit) onSubmit({values:numeric,reason})}} disabled={!canSubmit} style={{padding:"10px 24px",border:"none",borderRadius:8,background:canSubmit?headerColor:"#d1d5db",color:"#fff",cursor:canSubmit?"pointer":"not-allowed",fontSize:13,fontWeight:600}}>{mode==="update"?"Save Update":`Submit ${kind==="CN"?"Credit Note":"Debit Note"}`}</button>
    </div>
  </Modal>;
}

// ── Filter Modal ──
function FilterModal({open,onClose,onApply,filters,statusList}) {
  const [f,setF]=useState(filters);
  useEffect(()=>{if(open)setF(filters)},[open,filters]);
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggleStatus=s=>setF(p=>{const arr=p.statuses.includes(s)?p.statuses.filter(x=>x!==s):[...p.statuses,s];return{...p,statuses:arr}});
  const is={width:"100%",padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,outline:"none",color:"#374151",boxSizing:"border-box"};
  const ls={fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:5};
  const list = statusList || ALL_STATUSES;
  return <Modal open={open} onClose={onClose} title="Filter" width={680}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"16px"}}>
      <div><label style={ls}>Business Name</label><input value={f.bizName} onChange={e=>upd("bizName",e.target.value)} placeholder="Enter business name" style={is}/></div>
      <div><label style={ls}>Business ID</label><input value={f.bizId} onChange={e=>upd("bizId",e.target.value)} placeholder="Enter business ID" style={is}/></div>
      <div><label style={ls}>Brand Name</label><input value={f.brandName} onChange={e=>upd("brandName",e.target.value)} placeholder="Enter brand name" style={is}/></div>
      <div><label style={ls}>Brand ID</label><input value={f.brandId} onChange={e=>upd("brandId",e.target.value)} placeholder="Enter brand ID" style={is}/></div>
      <div><label style={ls}>Period (Month)</label><select value={f.month} onChange={e=>upd("month",e.target.value)} style={{...is,appearance:"auto",cursor:"pointer"}}><option value="">Select</option>{MONTHS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      <div><label style={ls}>Period (Year)</label><select value={f.year} onChange={e=>upd("year",e.target.value)} style={{...is,appearance:"auto",cursor:"pointer"}}><option value="">Select</option>{["2024","2025","2026"].map(y=><option key={y} value={y}>{y}</option>)}</select></div>
      <div><label style={ls}>Last Updated</label><input value={f.lastUpdated} onChange={e=>upd("lastUpdated",e.target.value)} placeholder="DD-MM-YYYY - DD-MM-YYYY" style={is}/></div>
      <div><label style={ls}>Submitted Date</label><input value={f.submittedDate} onChange={e=>upd("submittedDate",e.target.value)} placeholder="DD-MM-YYYY - DD-MM-YYYY" style={is}/></div>
      <div><label style={ls}>Updated by</label><input value={f.updatedBy} onChange={e=>upd("updatedBy",e.target.value)} placeholder="Enter email" style={is}/></div>
    </div>
    {list.length>1 && <div style={{marginTop:20}}>
      <label style={ls}>Status</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"10px 0"}}>
        {list.map(s=><label key={s} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:"#374151",cursor:"pointer"}}>
          <input type="checkbox" checked={f.statuses.includes(s)} onChange={()=>toggleStatus(s)} style={{width:16,height:16,accentColor:"#dc2626",cursor:"pointer"}}/>{s}
        </label>)}
      </div>
    </div>}
    <div style={{display:"flex",justifyContent:"flex-end",gap:12,marginTop:24,paddingTop:20,borderTop:"1px solid #e5e7eb"}}>
      <button onClick={onClose} style={{padding:"10px 24px",border:"1px solid #d1d5db",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151"}}>Cancel</button>
      <button onClick={()=>{onApply(f);onClose()}} style={{padding:"10px 24px",border:"none",borderRadius:8,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:600}}>Apply</button>
    </div>
  </Modal>;
}

// ── Internal Invoice Content (Phase 2) ──
function InvoiceContent({pageTitle,pageSubtitle,notify,mode,resetSignal}) {
  const [invoices,setInvoices]=useState(()=>mode==="realtime"?seedRealtime():seed());
  // Reset hook (Reset Data button)
  useEffect(()=>{ setInvoices(mode==="realtime"?seedRealtime():seed()); },[resetSignal,mode]);
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);
  const [filterModalOpen,setFilterModalOpen]=useState(false);
  const emptyFilters={bizName:"",bizId:"",brandName:"",brandId:"",month:"",year:"",lastUpdated:"",submittedDate:"",updatedBy:"",statuses:[]};
  const [filters,setFilters]=useState(emptyFilters);
  const [quickSearch,setQuickSearch]=useState("");
  const [quickSearchType,setQuickSearchType]=useState("e-Invoice ID");
  const [quickPeriod,setQuickPeriod]=useState("");
  const [quickStatus,setQuickStatus]=useState("");
  const [detailInvoice,setDetailInvoice]=useState(null);
  const [confirmModal,setConfirmModal]=useState({open:false});
  const [correctionDialog,setCorrectionDialog]=useState({open:false});

  const originalsCorrectedSet = useMemo(()=>new Set(invoices.filter(i=>i.prefix && i.status!=="Superseded").map(i=>i.originalId)),[invoices]);

  const activeChips=useMemo(()=>{
    const c=[];
    if(quickStatus)c.push({key:"quickStatus",label:`Status : ${quickStatus}`});
    if(quickPeriod)c.push({key:"quickPeriod",label:`Period : ${quickPeriod}`});
    if(filters.bizName)c.push({key:"bizName",label:`Business : ${filters.bizName}`});
    if(filters.brandName)c.push({key:"brandName",label:`Brand : ${filters.brandName}`});
    if(filters.statuses.length>0)c.push({key:"statuses",label:`Status : ${filters.statuses.join(", ")}`});
    if(filters.month)c.push({key:"month",label:`Month : ${filters.month}`});
    if(filters.year)c.push({key:"year",label:`Year : ${filters.year}`});
    if(filters.updatedBy)c.push({key:"updatedBy",label:`Updated by : ${filters.updatedBy}`});
    return c;
  },[quickStatus,quickPeriod,filters]);

  const removeChip=key=>{if(key==="quickStatus")setQuickStatus("");else if(key==="quickPeriod")setQuickPeriod("");else setFilters(p=>{const n={...p};if(key==="statuses")n.statuses=[];else n[key]="";return n})};
  const resetAllFilters=()=>{setFilters(emptyFilters);setQuickSearch("");setQuickPeriod("");setQuickStatus("");setPage(1)};

  const filtered=useMemo(()=>{
    let r=invoices.filter(inv=>{
      if(quickSearch){
        const q=quickSearch.toLowerCase();
        if(quickSearchType==="e-Invoice ID"&&!inv.id.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Business Name"&&!inv.biz.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Business ID"&&!inv.bus.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Brand Name"&&!inv.brand.toLowerCase().includes(q)) return false;
        if(quickSearchType==="Brand ID"&&!inv.clint.toLowerCase().includes(q)) return false;
      }
      if(quickPeriod&&inv.period!==quickPeriod) return false;
      if(quickStatus&&inv.status!==quickStatus) return false;
      if(filters.bizName&&!inv.biz.toLowerCase().includes(filters.bizName.toLowerCase())) return false;
      if(filters.bizId&&!inv.bus.toLowerCase().includes(filters.bizId.toLowerCase())) return false;
      if(filters.brandName&&!inv.brand.toLowerCase().includes(filters.brandName.toLowerCase())) return false;
      if(filters.brandId&&!inv.clint.toLowerCase().includes(filters.brandId.toLowerCase())) return false;
      if(filters.month&&inv.pMonth!==filters.month) return false;
      if(filters.year&&inv.pYear!==filters.year) return false;
      if(filters.updatedBy&&!inv.updatedBy.toLowerCase().includes(filters.updatedBy.toLowerCase())) return false;
      if(filters.statuses.length>0&&!filters.statuses.includes(inv.status)) return false;
      return true;
    });
    return r;
  },[invoices,quickSearch,quickSearchType,quickPeriod,quickStatus,filters]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/perPage));
  const pageItems=filtered.slice((page-1)*perPage,page*perPage);
  useEffect(()=>{setPage(1)},[filters,quickSearch,quickSearchType,quickPeriod,quickStatus,perPage]);

  const periods=useMemo(()=>[...new Set(invoices.map(i=>i.period))].sort(),[invoices]);
  const findById=(id)=>invoices.find(i=>i.id===id);
  const relatedFor=(inv)=>{
    if(!inv) return [];
    if(inv.prefix){
      const orig = findById(inv.originalId);
      const sibling = invoices.find(i=>i.originalId===inv.originalId && i.id!==inv.id);
      return [orig,sibling].filter(Boolean);
    } else {
      return invoices.filter(i=>i.originalId===inv.id);
    }
  };

  const closeCorrection = ()=>setCorrectionDialog({open:false});

  const performCorrection = ({values,reason}) => {
    const cd = correctionDialog;
    const kind = cd.kind;
    const orig = cd.originalInvoice;
    const targetId = `${kind}-${orig.id}`;
    const newBreakdown = orig.chargeBreakdown.map((c,i)=>({...c,amount:values[i]}));
    const newAmount = values.reduce((a,n)=>a+n,0);
    const now = new Date().toISOString();

    // Concurrency check (C5): for "create" or "convert", original must not already have a non-superseded correction (other than the one we're updating)
    if (cd.mode==="create") {
      const existing = invoices.find(i=>i.originalId===orig.id && i.status!=="Superseded" && i.id!==targetId);
      if (existing && existing.id !== (cd.currentInvoice && cd.currentInvoice.id)) {
        // Cross-conversion implicitly supersedes; this branch handles a true race only if the user opened the dialog before that correction existed.
        // For simplicity in the prototype, allow cross-conversion to proceed.
      }
    }

    if(cd.mode==="update"){
      // Update in-place — no new row created
      setInvoices(prev=>prev.map(i=>{
        if(i.id===cd.currentInvoice.id) {
          const newTimeline = [
            {date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${kind}-${orig.id} updated by FinOps. Resent to Taxilla. Reason: ${reason||"—"}`},
            ...i.timeline
          ];
          return {...i, amount:newAmount, chargeBreakdown:newBreakdown, status:"Submitted", lastUpdated:now, submittedDate:now, updatedBy:"finops@acme.com", timeline:newTimeline};
        }
        return i;
      }));
      notify("success",`${kind==="CN"?"Credit Note":"Debit Note"} ${targetId} updated and resent to Taxilla`);
    } else {
      // Create — could be initial or cross-conversion
      setInvoices(prev=>{
        let next = [...prev];
        const priorCorrection = prev.find(i=>i.originalId===orig.id && i.status!=="Superseded");
        if (priorCorrection && priorCorrection.id !== targetId) {
          next = next.map(i=> i.id===priorCorrection.id ? {...i,status:"Superseded",lastUpdated:now,timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Superseded",desc:`Replaced by ${targetId}`},...i.timeline]} : i);
        }
        const existing = next.find(i=>i.id===targetId);
        if (existing) {
          next = next.map(i=> i.id===targetId ? {...i,amount:newAmount,chargeBreakdown:newBreakdown,status:"Submitted",lastUpdated:now,submittedDate:now,updatedBy:"finops@acme.com",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${targetId} re-issued. Reason: ${reason||"—"}`},...i.timeline]} : i);
        } else {
          const newRow = {
            id:targetId, originalId:orig.id, prefix:kind,
            biz:orig.biz, bus:orig.bus, brand:orig.brand, clint:orig.clint,
            period:orig.period, pMonth:orig.pMonth, pYear:orig.pYear,
            amount:newAmount, status:"Submitted",
            submittedDate:now, lastUpdated:now,
            updatedBy:"finops@acme.com", chargeBreakdown:newBreakdown,
            timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${targetId} issued by FinOps. Sent to Taxilla. Reason: ${reason||"—"}`}]
          };
          next = [newRow,...next];
        }
        // Mark original as Corrected (A8 — neutral wording)
        next = next.map(i=> i.id===orig.id ? {...i,status:"Corrected",correctedBy:targetId,lastUpdated:now,updatedBy:"finops@acme.com",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Corrected",desc:`Original corrected by ${targetId}`},...i.timeline]} : i);
        return next.sort((a,b)=>new Date(b.lastUpdated||0)-new Date(a.lastUpdated||0));
      });
      notify("success",`${kind==="CN"?"Credit Note":"Debit Note"} ${targetId} created and sent to Taxilla`);
    }
    closeCorrection();
    setDetailInvoice(null);
  };

  const performAction=(action,invoice)=>{
    const now=new Date().toISOString();
    setInvoices(prev=>prev.map(i=>{
      if(i.id!==invoice.id) return i;
      if(action==="retryCalc"){const t=i.chargeBreakdown.reduce((s,c)=>s+c.amount,0);return{...i,status:"Submitted",amount:t,lastUpdated:now,submittedDate:now,updatedBy:"system@taxilla",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${i.id} retried calculation`},...i.timeline]};}
      if(action==="resend") return{...i,status:"Submitted",lastUpdated:now,submittedDate:now,updatedBy:"system@taxilla",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${i.id} resent to Taxilla`},...i.timeline]};
      if(action==="retrySubmit") return{...i,status:"Submitted",lastUpdated:now,updatedBy:"system@taxilla",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Submitted",desc:`${i.id} retry submission triggered`},...i.timeline]};
      if(action==="cancelInvoice") return{...i,status:"Canceled",lastUpdated:now,updatedBy:"john.doe@acme.com",timeline:[{date:fmtDatetime(now)+" (GMT+8)",status:"Canceled",desc:`${i.id} canceled`},...i.timeline]};
      return i;
    }));
  };

  const handleAction=(action,invoice)=>{
    if(action==="detail"){setDetailInvoice(invoice);return}
    if(action==="openCorrection"){const target=invoices.find(i=>i.id===invoice.correctedBy); if(target) setDetailInvoice(target); return;}
    if(action==="openOriginal"){const target=invoices.find(i=>i.id===invoice.originalId); if(target) setDetailInvoice(target); return;}
    if(action==="openRelated"){setDetailInvoice(invoice); return;}
    if(action==="viewCorrection"){const target=invoices.find(i=>i.id===invoice.correctedBy); if(target) setDetailInvoice(target); return;}
    if(action==="addCN"||action==="addDN"){
      // Concurrency / race check (C5): if invoice already corrected, refuse
      if (invoice.correctedBy) { notify("error","This invoice has already been corrected. Please refresh."); return; }
      const kind = action==="addCN"?"CN":"DN";
      setCorrectionDialog({open:true, mode:"create", kind, originalInvoice:invoice, currentInvoice:null});
      return;
    }
    if(action==="updateCN"||action==="updateDN"){
      const orig = invoices.find(i=>i.id===invoice.originalId);
      const kind = action==="updateCN"?"CN":"DN";
      setCorrectionDialog({open:true, mode:"update", kind, originalInvoice:orig, currentInvoice:invoice});
      return;
    }
    if(action==="convertToCN"||action==="convertToDN"){
      const orig = invoices.find(i=>i.id===invoice.originalId);
      const kind = action==="convertToCN"?"CN":"DN";
      setCorrectionDialog({open:true, mode:"create", kind, originalInvoice:orig, currentInvoice:null});
      return;
    }
    if(action==="cancelInvoice"){
      setConfirmModal({open:true,title:"Cancel e-Invoice?",confirmLabel:"Cancel e-Invoice",showTable:true,
        content:<div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{fontSize:20}}>⚠️</span><span style={{fontSize:13,color:"#374151"}}>Review the details before proceeding.</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e5e7eb"}}><th style={{padding:"8px 10px",textAlign:"left"}}>e-Invoice ID</th><th style={{padding:"8px 10px",textAlign:"left"}}>Business</th><th style={{padding:"8px 10px",textAlign:"left"}}>Brand</th><th style={{padding:"8px 10px",textAlign:"right"}}>Total Charge (MYR)</th></tr></thead>
            <tbody><tr><td style={{padding:"8px 10px"}}>{invoice.id}</td><td style={{padding:"8px 10px"}}>{invoice.biz}<br/><span style={{color:"#9ca3af",fontSize:11}}>{invoice.bus}</span></td><td style={{padding:"8px 10px"}}>{invoice.brand}<br/><span style={{color:"#9ca3af",fontSize:11}}>{invoice.clint}</span></td><td style={{padding:"8px 10px",textAlign:"right"}}>{fmtCurrency(invoice.amount)}</td></tr></tbody>
          </table>
        </div>,
        onConfirm:()=>{performAction("cancelInvoice",invoice);notify("success",`E-Invoice ${invoice.id} canceled`);setConfirmModal({open:false});setDetailInvoice(null);}
      });
      return;
    }
    const titles={retryCalc:"Retry Calculate",resend:"Resend",retrySubmit:"Retry Submission"};
    setConfirmModal({open:true,title:titles[action]||action,confirmLabel:titles[action],showTable:false,
      content:<div style={{background:"#f9fafb",padding:16,borderRadius:8,display:"grid",gridTemplateColumns:"120px 1fr",gap:"8px 14px",fontSize:13}}>
        <span style={{color:"#6b7280"}}>e-Invoice ID</span><span style={{fontWeight:600}}>{invoice.id}</span>
        <span style={{color:"#6b7280"}}>Business</span><span style={{fontWeight:600}}>{invoice.biz}</span>
        <span style={{color:"#6b7280"}}>Brand</span><span style={{fontWeight:600}}>{invoice.brand}</span>
        <span style={{color:"#6b7280"}}>Period</span><span style={{fontWeight:600}}>{invoice.period}</span>
        <span style={{color:"#6b7280"}}>Status</span><span><StatusBadge status={invoice.status}/></span>
      </div>,
      onConfirm:()=>{performAction(action,invoice);notify("success",`${invoice.id}: action ${titles[action]} completed`);setConfirmModal({open:false});setDetailInvoice(null);}
    });
  };

  return <>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"28px 32px 0",background:"#fff"}}>
          <h1 style={{fontSize:22,fontWeight:700,color:"#111827",marginBottom:4}}>{pageTitle}</h1>
          <p style={{fontSize:13,color:"#9ca3af",marginBottom:16}}>{pageSubtitle}</p>
          {mode==="monthly" && <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#5b21b6",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>✎</span>
            <span><strong>Phase 2:</strong> When an original e-Invoice is <strong>Rejected, Cleared or Canceled</strong>, you may issue a Credit Note or Debit Note within the correction window: from 3 days after submitted-date until end of submitted-month. Existing CN/DN can be updated in place or cross-converted (creates a new row, supersedes the prior one).</span>
          </div>}
          {mode==="realtime" && <div style={{background:"#fef3c7",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#92400e",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>ℹ</span> <span>CN/DN corrections are <strong>out of scope for Realtime e-Invoice</strong> in Phase 2 (per scope D1). Only Phase 1 actions are available.</span>
          </div>}
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:12}}>
            <div style={{display:"flex"}}>
              <select value={quickSearchType} onChange={e=>{setQuickSearchType(e.target.value);setQuickSearch("")}} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:"6px 0 0 6px",fontSize:13,background:"#f9fafb",color:"#374151",cursor:"pointer",outline:"none",borderRight:"none"}}>
                {SEARCH_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <input value={quickSearch} onChange={e=>setQuickSearch(e.target.value)} placeholder={"Search "+quickSearchType.toLowerCase()} style={{padding:"9px 14px",border:"1px solid #d1d5db",borderRadius:"0 6px 6px 0",fontSize:13,outline:"none",color:"#374151",width:200}}/>
            </div>
            <select value={quickPeriod} onChange={e=>setQuickPeriod(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickPeriod?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:140,background:"#fff"}}>
              <option value="">Select Period</option>{periods.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select value={quickStatus} onChange={e=>setQuickStatus(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickStatus?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:160,background:"#fff"}}>
              <option value="">Select Status</option>{ALL_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
            <button onClick={()=>setFilterModalOpen(true)} style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",border:"1px solid #d1d5db",borderRadius:6,background:"#fff",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151"}}>Filter <span style={{fontSize:11,color:"#9ca3af"}}>▼</span></button>
            {activeChips.length>0&&<span onClick={resetAllFilters} style={{color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:500}}>Reset Filter</span>}
          </div>
          {activeChips.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
            {activeChips.map(chip=><span key={chip.key} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:999,background:"#f3f4f6",fontSize:12,color:"#374151",border:"1px solid #e5e7eb"}}>
              {chip.label}<button onClick={()=>removeChip(chip.key)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#9ca3af",padding:0,lineHeight:1}}>✕</button>
            </span>)}
          </div>}
        </div>
        <div style={{padding:"0 32px 24px",background:"#fff"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:1200}}>
              <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>e-Invoice ID</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Business</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Brand</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Period</th>
                <th style={{padding:"14px 10px",textAlign:"right",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Total Charge (MYR)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Status</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Submitted Date (GMT+8)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Last Updated (GMT+8)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",whiteSpace:"nowrap"}}>Updated By</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151",position:"sticky",right:0,background:"#fff",zIndex:2,boxShadow:"-4px 0 8px rgba(0,0,0,0.04)"}}>Action</th>
              </tr></thead>
              <tbody>
                {pageItems.length===0?<tr><td colSpan={10} style={{padding:60,textAlign:"center",color:"#9ca3af"}}>No invoices found</td></tr>
                :pageItems.map(inv=>{
                  const isCorrection = !!inv.prefix;
                  return <tr key={inv.id} style={{borderBottom:"1px solid #f3f4f6",background:isCorrection?(inv.prefix==="CN"?"#f0fdfa":"#faf5ff"):"transparent",opacity:inv.status==="Superseded"?0.55:1}}
                    onMouseEnter={e=>{if(inv.status!=="Superseded")e.currentTarget.style.background=isCorrection?(inv.prefix==="CN"?"#ccfbf1":"#f3e8ff"):"#fafafa"}} onMouseLeave={e=>{e.currentTarget.style.background=isCorrection?(inv.prefix==="CN"?"#f0fdfa":"#faf5ff"):"transparent"}}>
                    <td style={{padding:"14px 10px",fontWeight:500,color:"#111827"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        {isCorrection && <span style={{padding:"2px 6px",borderRadius:4,background:inv.prefix==="CN"?"#0d9488":"#6d28d9",color:"#fff",fontSize:10,fontWeight:700}}>{inv.prefix}</span>}
                        <span>{inv.id}</span>
                      </div>
                      {inv.correctedBy && <div style={{fontSize:10,color:"#6d28d9",marginTop:2}}>Corrected by {inv.correctedBy}</div>}
                      {isCorrection && <div style={{fontSize:10,color:"#9ca3af",marginTop:2}}>Refs: {inv.originalId}</div>}
                    </td>
                    <td style={{padding:"14px 10px"}}><div style={{color:"#111827",fontWeight:500}}>{inv.biz}</div><div style={{color:"#9ca3af",fontSize:11}}>{inv.bus}</div></td>
                    <td style={{padding:"14px 10px",maxWidth:180}}><div style={{color:"#111827",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.brand}</div><div style={{color:"#9ca3af",fontSize:11}}>{inv.clint}</div></td>
                    <td style={{padding:"14px 10px",color:"#374151",whiteSpace:"nowrap"}}>{inv.period}</td>
                    <td style={{padding:"14px 10px",textAlign:"right",fontWeight:500,color:inv.amount!=null?"#111827":"#d1d5db",whiteSpace:"nowrap"}}>{inv.amount!=null?fmtCurrency(inv.amount):"-"}</td>
                    <td style={{padding:"14px 10px"}}><StatusBadge status={inv.status}/></td>
                    <td style={{padding:"14px 10px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDatetime(inv.submittedDate)}</td>
                    <td style={{padding:"14px 10px",color:"#6b7280",fontSize:12,whiteSpace:"nowrap"}}>{fmtDatetime(inv.lastUpdated)}</td>
                    <td style={{padding:"14px 10px",color:"#6b7280",fontSize:12}}>{inv.updatedBy||"-"}</td>
                    <td style={{padding:"14px 10px",position:"sticky",right:0,background:isCorrection?(inv.prefix==="CN"?"#f0fdfa":"#faf5ff"):"#fff",zIndex:1,boxShadow:"-4px 0 8px rgba(0,0,0,0.04)"}}>
                      <KebabMenu invoice={inv} onAction={handleAction} mode={mode} originalsCorrectedSet={originalsCorrectedSet} allInvoices={invoices}/>
                    </td>
                  </tr>;})}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 0",borderTop:"3px solid #dc2626"}}>
            <select value={perPage} onChange={e=>setPerPage(Number(e.target.value))} style={{padding:"7px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:"#374151",cursor:"pointer",outline:"none",background:"#fff"}}>
              {[5,10,25].map(n=><option key={n} value={n}>{n} items per page</option>)}
            </select>
            <div style={{display:"flex",alignItems:"center",gap:12,fontSize:13,color:"#6b7280"}}>
              <span>Showing {filtered.length===0?0:(page-1)*perPage+1} - {Math.min(page*perPage,filtered.length)} from {filtered.length} entries</span>
              <div style={{display:"flex",alignItems:"center",gap:2}}>
                <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===1?"not-allowed":"pointer",fontSize:18,color:page===1?"#e5e7eb":"#9ca3af"}}>‹</button>
                {Array.from({length:totalPages},(_,i)=>i+1).slice(0,7).map(p=><button key={p} onClick={()=>setPage(p)} style={{width:32,height:32,border:"none",borderRadius:6,background:page===p?"#dc2626":"transparent",color:page===p?"#fff":"#6b7280",cursor:"pointer",fontSize:13,fontWeight:page===p?700:400}}>{p}</button>)}
                <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===totalPages?"not-allowed":"pointer",fontSize:18,color:page===totalPages?"#e5e7eb":"#9ca3af"}}>›</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <FilterModal open={filterModalOpen} onClose={()=>setFilterModalOpen(false)} onApply={setFilters} filters={filters}/>
    {detailInvoice&&<DetailModal invoice={detailInvoice} onClose={()=>setDetailInvoice(null)} onAction={(a,i)=>{if(a==="openOriginal"||a==="openCorrection"||a==="openRelated"||a==="viewCorrection"){handleAction(a,i);return;} setDetailInvoice(null);handleAction(a,i)}} mode={mode} relatedRows={relatedFor(detailInvoice)} allInvoices={invoices} originalsCorrectedSet={originalsCorrectedSet}/>}

// ── External Dashboard Content (Phase 2) — per B5/D2: only Cleared and only show originals + Cleared CN/DN ──
function ExternalDashboardContent({notify, resetSignal}) {
  const allInvoices = useMemo(()=>{
    const m = seed().filter(i=>(i.status==="Cleared" || (i.prefix && i.status==="Cleared"))).map(i=>({...i,type:"Monthly Consolidated"}));
    const r = seedRealtime().filter(i=>i.status==="Cleared").map(i=>({...i,type:"Realtime"}));
    return [...m,...r].sort((a,b)=>new Date(b.lastUpdated)-new Date(a.lastUpdated));
  },[resetSignal]);
  const [page,setPage]=useState(1);
  const [perPage,setPerPage]=useState(10);
  const [filterModalOpen,setFilterModalOpen]=useState(false);
  const emptyFilters={bizName:"",bizId:"",brandName:"",brandId:"",month:"",year:"",lastUpdated:"",submittedDate:"",updatedBy:"",statuses:[]};
  const [filters,setFilters]=useState(emptyFilters);
  const [quickSearch,setQuickSearch]=useState("");
  const [quickSearchType,setQuickSearchType]=useState("e-Invoice ID");
  const [quickPeriod,setQuickPeriod]=useState("");
  const [quickType,setQuickType]=useState("");
  const [detailInvoice,setDetailInvoice]=useState(null);

  const filtered = useMemo(()=>allInvoices.filter(inv=>{
    if(quickSearch){
      const q=quickSearch.toLowerCase();
      if(quickSearchType==="e-Invoice ID"&&!inv.id.toLowerCase().includes(q)) return false;
      if(quickSearchType==="Business Name"&&!inv.biz.toLowerCase().includes(q)) return false;
      if(quickSearchType==="Brand Name"&&!inv.brand.toLowerCase().includes(q)) return false;
    }
    if(quickPeriod&&inv.period!==quickPeriod) return false;
    if(quickType&&inv.type!==quickType) return false;
    return true;
  }),[allInvoices,quickSearch,quickSearchType,quickPeriod,quickType]);

  const totalPages=Math.max(1,Math.ceil(filtered.length/perPage));
  const pageItems=filtered.slice((page-1)*perPage,page*perPage);
  const periods=useMemo(()=>[...new Set(allInvoices.map(i=>i.period))].sort(),[allInvoices]);

  return <>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflow:"auto"}}>
        <div style={{padding:"28px 32px 0",background:"#fff"}}>
          <h1 style={{fontSize:22,fontWeight:700,color:"#111827",marginBottom:4}}>e-Invoice Report</h1>
          <p style={{fontSize:13,color:"#9ca3af",marginBottom:16}}>View, preview, and download cleared e-Invoices, Credit Notes, and Debit Notes</p>
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#1e40af",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>ℹ</span> Per scope, only documents that have been Cleared by IRBM are visible here. Each document (original / CN / DN) has its own PDF.
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:12}}>
            <div style={{display:"flex"}}>
              <select value={quickSearchType} onChange={e=>{setQuickSearchType(e.target.value);setQuickSearch("")}} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:"6px 0 0 6px",fontSize:13,background:"#f9fafb",color:"#374151",cursor:"pointer",outline:"none",borderRight:"none"}}>
                {["e-Invoice ID","Business Name","Brand Name"].map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <input value={quickSearch} onChange={e=>setQuickSearch(e.target.value)} placeholder={"Search "+quickSearchType.toLowerCase()} style={{padding:"9px 14px",border:"1px solid #d1d5db",borderRadius:"0 6px 6px 0",fontSize:13,outline:"none",color:"#374151",width:200}}/>
            </div>
            <select value={quickPeriod} onChange={e=>setQuickPeriod(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickPeriod?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:140,background:"#fff"}}>
              <option value="">Select Period</option>{periods.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select value={quickType} onChange={e=>setQuickType(e.target.value)} style={{padding:"9px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:quickType?"#374151":"#9ca3af",cursor:"pointer",outline:"none",minWidth:170,background:"#fff"}}>
              <option value="">Select Type</option><option value="Monthly Consolidated">Monthly Consolidated</option><option value="Realtime">Realtime</option>
            </select>
            <button style={{padding:"9px 18px",border:"1px solid #dc2626",borderRadius:6,background:"#fff",color:"#dc2626",cursor:"pointer",fontSize:13,fontWeight:600}}>⬇ Export CSV</button>
          </div>
        </div>
        <div style={{padding:"0 32px 24px",background:"#fff"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:1100}}>
              <thead><tr style={{borderBottom:"2px solid #e5e7eb"}}>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Document ID</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Document Type</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Brand</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Period</th>
                <th style={{padding:"14px 10px",textAlign:"right",fontWeight:600,color:"#374151"}}>Total (MYR)</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Status</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>IRBM UUID</th>
                <th style={{padding:"14px 10px",textAlign:"left",fontWeight:600,color:"#374151"}}>Action</th>
              </tr></thead>
              <tbody>
                {pageItems.length===0?<tr><td colSpan={8} style={{padding:60,textAlign:"center",color:"#9ca3af"}}>No invoices found</td></tr>
                :pageItems.map(inv=><tr key={inv.id+inv.type} style={{borderBottom:"1px solid #f3f4f6"}}>
                  <td style={{padding:"14px 10px",fontWeight:500,color:"#111827"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      {inv.prefix && <span style={{padding:"2px 6px",borderRadius:4,background:inv.prefix==="CN"?"#0d9488":"#6d28d9",color:"#fff",fontSize:10,fontWeight:700}}>{inv.prefix}</span>}

                    </div>

                  <td style={{padding:"14px 10px",textAlign:"right",fontWeight:500,color:"#111827"}}>{fmtCurrency(inv.amount)}</td>
                  <td style={{padding:"14px 10px"}}><StatusBadge status={inv.status}/></td>
                  <td style={{padding:"14px 10px",color:"#0d9488",fontSize:11,fontFamily:"monospace"}}>{inv.irbmUUID||"-"}</td>
                  <td style={{padding:"14px 10px",whiteSpace:"nowrap"}}>
                    <button onClick={()=>setDetailInvoice(inv)} style={{padding:"6px 12px",border:"1px solid #d1d5db",borderRadius:6,background:"#fff",color:"#374151",cursor:"pointer",fontSize:12,fontWeight:500,marginRight:6}}>👁 View</button>
                    <button onClick={()=>notify("success",`Downloaded ${inv.id}.pdf`)} style={{padding:"6px 12px",border:"none",borderRadius:6,background:"#dc2626",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>⬇ PDF</button>
                  </td>
                </tr>)}
              </tbody>
            </table>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 0 0",borderTop:"3px solid #dc2626"}}>
            <select value={perPage} onChange={e=>setPerPage(Number(e.target.value))} style={{padding:"7px 12px",border:"1px solid #d1d5db",borderRadius:6,fontSize:13,color:"#374151",cursor:"pointer",outline:"none",background:"#fff"}}>
              {[5,10,25].map(n=><option key={n} value={n}>{n} items per page</option>)}
            </select>
            <div style={{display:"flex",alignItems:"center",gap:12,fontSize:13,color:"#6b7280"}}>
              <span>Showing {filtered.length===0?0:(page-1)*perPage+1} - {Math.min(page*perPage,filtered.length)} from {filtered.length} entries</span>
              <div style={{display:"flex",alignItems:"center",gap:2}}>
                <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===1?"not-allowed":"pointer",fontSize:18,color:page===1?"#e5e7eb":"#9ca3af"}}>‹</button>
                {Array.from({length:totalPages},(_,i)=>i+1).slice(0,7).map(p=><button key={p} onClick={()=>setPage(p)} style={{width:32,height:32,border:"none",borderRadius:6,background:page===p?"#dc2626":"transparent",color:page===p?"#fff":"#6b7280",cursor:"pointer",fontSize:13,fontWeight:page===p?700:400}}>{p}</button>)}
                <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} style={{width:32,height:32,border:"none",borderRadius:6,background:"none",cursor:page===totalPages?"not-allowed":"pointer",fontSize:18,color:page===totalPages?"#e5e7eb":"#9ca3af"}}>›</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <FilterModal open={filterModalOpen} onClose={()=>setFilterModalOpen(false)} onApply={setFilters} filters={filters} statusList={[]}/>
    {detailInvoice&&<DetailModal invoice={detailInvoice} onClose={()=>setDetailInvoice(null)} onAction={()=>{}} mode={detailInvoice.type==="Realtime"?"realtime":"monthly"} readOnly={true}/>}
  </>;
}

}

  if (authed) return <LHDNApp />;
  return (
    <div style={{height:"100vh",width:"100vw",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%)",fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,opacity:0.04,backgroundImage:"radial-gradient(circle at 1px 1px, white 1px, transparent 0)",backgroundSize:"40px 40px"}} />
      <div style={{background:"#fff",borderRadius:16,padding:"48px 44px",width:400,maxWidth:"90vw",boxShadow:"0 25px 60px rgba(0,0,0,0.4)",position:"relative",zIndex:1,animation:"fadeIn 0.4s ease"}}>
        <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}`}</style>
        <div style={{display:"flex",justifyContent:"center",marginBottom:28}}>
          <div style={{width:56,height:56,background:"#dc2626",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:22,boxShadow:"0 4px 16px rgba(220,38,38,0.35)"}}>RU</div>
        </div>
        <h1 style={{textAlign:"center",fontSize:20,fontWeight:700,color:"#111827",marginBottom:6}}>LHDN e-Invoice System</h1>
        <p style={{textAlign:"center",fontSize:13,color:"#6d28d9",marginBottom:8,fontWeight:600}}>Phase 2 — Internal Correction (CN/DN, revised)</p>
        <p style={{textAlign:"center",fontSize:11,color:"#9ca3af",marginBottom:32}}>Enter password to access dashboards</p>
        <div style={{marginBottom:20}}>
          <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Password</label>
          <div style={{display:"flex",border:`2px solid ${error?"#ef4444":"#e5e7eb"}`,borderRadius:10,overflow:"hidden",animation:error?"shake 0.4s ease":"none"}}>
            <div style={{padding:"0 14px",display:"flex",alignItems:"center",color:"#9ca3af",fontSize:18,background:"#f9fafb",borderRight:"1px solid #e5e7eb"}}>🔒</div>
            <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setError(false)}} onKeyDown={e=>{if(e.key==="Enter")handleSubmit()}} placeholder="Enter password" autoFocus style={{flex:1,border:"none",outline:"none",padding:"13px 14px",fontSize:14,color:"#111827",background:"transparent"}}/>
            <button onClick={()=>setShow(!show)} style={{background:"none",border:"none",cursor:"pointer",padding:"0 14px",color:"#9ca3af",fontSize:16,display:"flex",alignItems:"center"}}>{show?"🙈":"👁"}</button>
          </div>
          {error && (<div style={{fontSize:12,color:"#ef4444",marginTop:8,display:"flex",alignItems:"center",gap:6}}><span>⚠</span> Incorrect password.</div>)}
        </div>
        <button onClick={handleSubmit} style={{width:"100%",padding:"13px 0",border:"none",borderRadius:10,background:pw.length>0?"#dc2626":"#fca5a5",color:"#fff",fontSize:14,fontWeight:700,cursor:pw.length>0?"pointer":"not-allowed",letterSpacing:0.3,boxShadow:pw.length>0?"0 4px 14px rgba(220,38,38,0.3)":"none"}}>Access Dashboard</button>
        <p style={{textAlign:"center",fontSize:11,color:"#d1d5db",marginTop:24}}>Password: <code style={{color:"#9ca3af"}}>MYeinvoice</code></p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PasswordGate));
  </script>
</body>
</html>
